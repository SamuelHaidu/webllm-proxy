[project]
name = "chatgpt-web-proxy"
dynamic = ["version"]
description = "OpenAI-compatible local proxy over the ChatGPT web app, driven through a stealth browser (CloakBrowser)."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["chatgpt", "openai", "proxy", "api", "cloakbrowser", "coding-agent"]
dependencies = [
    # Browser layer: stealth Chromium that passes Cloudflare Turnstile.
    # The ~200MB browser binary auto-downloads on first run (or `chatgpt-proxy install`).
    "cloakbrowser>=0.4.10",
    "flask>=3.0",
    "flask-cors>=6.0",
]

[project.scripts]
chatgpt-proxy = "chatgpt_proxy.__main__:main"

[project.urls]
Documentation = "https://github.com/CloakHQ/CloakBrowser"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "src/chatgpt_proxy/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/chatgpt_proxy"]

[dependency-groups]
dev = []
