name: Offline bundle

# Builds the corporate/air-gapped install bundle (scripts/build_offline_bundle.py,
# see README's "Corporate / air-gapped install") for both Linux and Windows.
#
# Each OS builds NATIVELY on its own runner (not cross-built from one machine):
# `uv run poe bundle` with no --target always produces a complete bundle incl.
# the CloakBrowser binary, and that binary has no supported cross-platform
# download (see the module docstring in build_offline_bundle.py) -- a native
# runner per OS is the only way to get a *complete* bundle for both. This also
# happens to be the only place this project's test suite runs on Windows at all.
#
# For an ad-hoc wheels-only cross-build from a single machine (no browser
# binary), see `uv run poe bundle-linux` / `bundle-windows` instead.

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: windows-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install project + dev dependencies
        run: uv sync --locked

      - name: Quality gate (fmt/lint/typecheck/test) on this OS
        run: uv run poe check

      - name: Download the CloakBrowser binary for this OS
        run: uv run webllm-proxy install

      - name: Build the offline bundle (native -- includes the browser binary)
        run: uv run poe bundle

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: offline-bundle-${{ matrix.target }}
          path: dist/offline/**
          if-no-files-found: error
