name: Offline bundle

# Builds the corporate/air-gapped install bundle (scripts/build_offline_bundle.py,
# see README's "Corporate / air-gapped install") for both Linux and Windows.
#
# Each OS builds NATIVELY on its own runner (not cross-built from one machine):
# `uv run poe bundle` with no --target always produces a complete bundle incl.
# the CloakBrowser binary, and that binary has no supported cross-platform
# download (see the module docstring in build_offline_bundle.py) -- a native
# runner per OS is the only way to get a *complete* bundle for both. This also
# happens to be the only place this project's test suite runs on Windows at all.
#
# For an ad-hoc wheels-only cross-build from a single machine (no browser
# binary), see `uv run poe bundle-linux` / `bundle-windows` instead.
#
# Triggered by release.yml pushing a vX.Y.Z tag: each OS zips its bundle and
# attaches it to that tag's GitHub Release (already created by release.yml,
# so this only adds assets to it). A manual workflow_dispatch run (no tag)
# just uploads the zip as a workflow artifact instead, for testing.

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: windows-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write # only used to attach the zip to the Release on a tag push
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install project + dev dependencies
        run: uv sync --locked

      - name: Quality gate (fmt/lint/typecheck/test) on this OS
        run: uv run poe check

      - name: Download the CloakBrowser binary for this OS
        run: uv run webllm-proxy install

      - name: Build the offline bundle (native -- includes the browser binary)
        run: uv run poe bundle

      - name: Zip the bundle (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist/offline
          zip -r "../../webllm-proxy-offline-${{ matrix.target }}.zip" .

      - name: Zip the bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/offline/* -DestinationPath "webllm-proxy-offline-${{ matrix.target }}.zip"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: offline-bundle-${{ matrix.target }}
          path: webllm-proxy-offline-${{ matrix.target }}.zip
          if-no-files-found: error

      - name: Attach zip to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: webllm-proxy-offline-${{ matrix.target }}.zip
